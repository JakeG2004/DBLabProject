{% extends "vmbsite/base.html" %}

{% block title %}Uniform DB{% endblock %}

{% load static %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}

<div class="row">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-4">Uniform DB</h1>
    </div>
</div>

<div class="row">
    <form id="member-form">
        {% csrf_token %}
        <div class="d-flex gap-2 align-items-center">
            <input type="text" id="search_box" class="form-control w-50" name="search_box" placeholder="ID or Uniform Type">
            <button type="button" id="submit-btn" class="btn btn-primary w-25">Search</button>
            <button type="button" class="btn btn-success w-25" data-bs-toggle="modal" data-bs-target="#addUniformModal">
                Add
            </button>
        </div>
    </form>
</div>

<hr>

<div class="row">
    <table class="table">
    <thead>
        <tr>
        <th scope="col">Uniform Type</th>
        <th scope="col">ID</th>
        <th scope="col">Size</th>
        <th scope="col"></th>
        <th scope="col"></th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><input type="text" name="uniform_type_1" class="form-control" value="Shako"></td>
            <td><input type="text" name="uniform_id_1" class="form-control" value="M32"></td>
            <td><input type="text" name="uniform_size_1" class="form-control" value="Medium"></td>
            <td><button type="submit" class="btn btn-primary w-100">Apply</button></td>
            <td><button type="submit" class="btn btn-danger w-100">Delete</button></td>
        </tr>
        <tr>
            <td><input type="text" name="uniform_type_2" class="form-control" value="Jacket"></td>
            <td><input type="text" name="uniform_id_2" class="form-control" value="12345"></td>
            <td><input type="text" name="uniform_size_2" class="form-control" value="44L"></td>
            <td><button type="submit" class="btn btn-primary w-100">Apply</button></td>
            <td><button type="submit" class="btn btn-danger w-100">Delete</button></td>
        </tr>
        <tr>
            <td><input type="text" name="uniform_type_3" class="form-control" value="Pants"></td>
            <td><input type="text" name="uniform_id_3" class="form-control" value="23456"></td>
            <td><input type="text" name="uniform_size_3" class="form-control" value="34L"></td>
            <td><button type="submit" class="btn btn-primary w-100">Apply</button></td>
            <td><button type="submit" class="btn btn-danger w-100">Delete</button></td>
        </tr>
    </tbody>
    </table>
</div>

<div class="modal fade" id="addUniformModal" tabindex="-1" aria-labelledby="addUniformModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addUniformModalLabel">Add New Uniform Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="POST" action="{% url 'vmb:uniform_db' %}">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label for="uniform_type" class="form-label">Uniform Type</label>
            <select class="form-select" id="uniform_type" name="uniform_type" required>
              <option value="" selected disabled>Select type...</option>
              <option value="Shako">Shako</option>
              <option value="Jacket">Jacket</option>
              <option value="Pants">Pants</option>
              <option value="Skirt">Skirt</option>
              <option value="Left Gauntlet">Left Gauntlet</option>
              <option value="Right Gauntlet">Right Gauntlet</option>
              <option value="Cape">Cape</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="uniform_id" class="form-label">Uniform ID</label>
            <input type="text" class="form-control" id="uniform_id" name="uniform_id" placeholder="e.g. M32" required>
          </div>
          <div class="mb-3">
            <label for="uniform_size" class="form-label">Size</label>
            <input type="text" class="form-control" id="uniform_size" name="uniform_size" placeholder="e.g. Medium, 44L" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" name="add_uniform" class="btn btn-success">Save Uniform</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
