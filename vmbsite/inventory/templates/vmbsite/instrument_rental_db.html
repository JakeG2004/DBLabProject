{% extends "vmbsite/base.html" %}

{% block title %}Instrument Rental DB{% endblock %}

{% load static %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}

<div class="row">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-4">Instrument Rental DB</h1>
    </div>
</div>

<div class="row">
    <form id="member-form">
        {% csrf_token %}
        <div class="d-flex gap-2 align-items-center">
            <input type="text" id="search_box" class="form-control w-75" name="search_box" placeholder="Vandal #, First Name, Last Name, Instrument ID, or Instrument Type">
            <button type="button" id="submit-btn" class="btn btn-primary w-25">Search</button>
        </div>
    </form>
</div>

<hr>

<div class="row">
    <table class="table">
    <thead>
        <tr>
        <th scope="col">Vandal #</th>
        <th scope="col">First Name</th>
        <th sctop="col">Last Name</th>
        <th scope="col">Instrument ID</th>
        <th scope="col">Instrument Type</th>
        <th scope="col"></th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><input type="text" name="vandal_num_1" class="form-control" value="V000001" readonly></td>
            <td><input type="text" name="first_name_1" class="form-control" value="Jake" readonly></td>
            <td><input type="text" name="last_name_1" class="form-control" value="Gendreau" readonly></td>
            <td><input type="text" name="inst_id_1" class="form-control" value="D001" readonly></td>
            <td><input type="text" name="inst_type_1" class="form-control" value="Drum" readonly></td>
            <td class="d-flex gap-1">
                <button type="submit" class="btn btn-danger">Delete</button>
            </td>
        </tr>
        <tr>
            <td><input type="text" name="vandal_num_2" class="form-control" value="V0000000" readonly></td>
            <td><input type="text" name="first_name_2" class="form-control" value="Michael" readonly></td>
            <td><input type="text" name="last_name_2" class="form-control" value="Crapse" readonly></td>
            <td><input type="text" name="inst_id_2" class="form-control" value="TP01" readonly></td>
            <td><input type="text" name="inst_type_2" class="form-control" value="Trumpet" readonly></td>
            <td class="d-flex gap-1">
                <button type="submit" class="btn btn-danger">Delete</button>
            </td>
        </tr>
        <tr>
            <td><input type="text" name="vandal_num_3" class="form-control" value="V00000002" readonly></td>
            <td><input type="text" name="first_name_3" class="form-control" value="Joe" readonly></td>
            <td><input type="text" name="last_name_3" class="form-control" value="Vandal" readonly></td>
            <td><input type="text" name="inst_id_3" class="form-control" value="MF01" readonly></td>
            <td><input type="text" name="inst_type_3" class="form-control" value="F Mellophone" readonly></td>
            <td class="d-flex gap-1">
                <button type="submit" class="btn btn-danger">Delete</button>
            </td>
        </tr>
    </tbody>
    </table>
</div>
{% endblock %}
