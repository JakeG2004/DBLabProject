{% extends "vmbsite/base.html" %}

{% block title %}Member DB{% endblock %}

{% load static %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}

<div class="row">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-4">Member DB</h1>
    </div>
</div>

<div class="row">
    <form id="member-form">
        {% csrf_token %}
        <div class="d-flex gap-2 align-items-center">
            <input type="text" id="search_box" class="form-control w-50" name="search_box" placeholder="Vandal #, First Name, or Last Name">
            <button type="button" id="submit-btn" class="btn btn-primary w-25">Search</button>
            <button type="button" class="btn btn-success w-25" data-bs-toggle="modal" data-bs-target="#addMemberModal">
                Add
            </button>
        </div>
    </form>
</div>

<hr>

<div class="row">
    <table class="table">
    <thead>
        <tr>
        <th scope="col">Vandal #</th>
        <th scope="col">First Name</th>
        <th scope="col">Last Name</th>
        <th scope="col"></th>
        <th scope="col"></th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><input type="text" name="vandal_id_1" class="form-control" value="V000001"></td>
            <td><input type="text" name="first_name_1" class="form-control" value="Jake"></td>
            <td><input type="text" name="last_name_1" class="form-control" value="Gendreau"></td>
            <td><button type="submit" class="btn btn-primary w-100">Apply</button></td>
            <td><button type="submit" class="btn btn-danger w-100">Delete</button></td>
        </tr>
        <tr>
            <td><input type="text" name="vandal_id_2" class="form-control" value="V0000000"></td>
            <td><input type="text" name="first_name_2" class="form-control" value="Michael"></td>
            <td><input type="text" name="last_name_2" class="form-control" value="Crapse"></td>
            <td><button type="submit" class="btn btn-primary w-100">Apply</button></td>
            <td><button type="submit" class="btn btn-danger w-100">Delete</button></td>
        </tr>
        <tr>
            <td><input type="text" name="vandal_id_3" class="form-control" value="V00000002"></td>
            <td><input type="text" name="first_name_3" class="form-control" value="Joe"></td>
            <td><input type="text" name="last_name_3" class="form-control" value="Vandal"></td>
            <td><button type="submit" class="btn btn-primary w-100">Apply</button></td>
            <td><button type="submit" class="btn btn-danger w-100">Delete</button></td>
        </tr>
    </tbody>
    </table>
</div>

<div class="modal fade" id="addMemberModal" tabindex="-1" aria-labelledby="addMemberModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addMemberModalLabel">Add New Member</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="POST" action="{% url 'vmb:member_db' %}">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label for="vandal_id" class="form-label">Vandal #</label>
            <input type="text" class="form-control" id="vandal_id" name="vandal_id" placeholder="V01234567" required>
          </div>
          <div class="mb-3">
            <label for="first_name" class="form-label">First Name</label>
            <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Joe" required>
          </div>
          <div class="mb-3">
            <label for="last_name" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Vandal" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" name="add_member" class="btn btn-success">Save Member</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
